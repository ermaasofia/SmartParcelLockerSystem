<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pick N Go - Retrieve Parcel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=15">

</head>

<body>
    <a href="index.html?v=2" class="logout-link">BACK</a>

    <div class="container auth-box" id="retrieve-box">
        <h2>ENTER 4 DIGIT PIN</h2>

        <form id="retrieveForm">
            <div class="pin-container">
                <input type="text" class="pin-box" maxlength="1" pattern="[0-9]" required>
                <input type="text" class="pin-box" maxlength="1" pattern="[0-9]" required>
                <input type="text" class="pin-box" maxlength="1" pattern="[0-9]" required>
                <input type="text" class="pin-box" maxlength="1" pattern="[0-9]" required>
            </div>
            <button type="submit" class="btn">UNLOCK</button>
        </form>

        <p id="retrieve-message" style="margin-top: 20px; color: red;"></p>
        <a id="emergency-btn" href="emergency.html" class="btn"
            style="display: none; margin-top: 15px; background-color: #ff4d4d; text-align: center; text-decoration: none;">Emergency
            Form</a>
    </div>

    <!-- Success Box (Hidden by default) -->
    <div class="success-card" id="success-box" style="display: none;">
        <div class="success-icon">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="12" r="10" fill="#2ecc71" fill-opacity="0.2" />
                <circle cx="12" cy="12" r="9" stroke="#2ecc71" stroke-width="2" />
                <path d="M8 12L11 15L16 9" stroke="#2ecc71" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
        </div>
        <h2
            style="color: #2ecc71; margin-top: 15px; margin-bottom: 15px; font-size: 1.8rem; font-family: var(--font-heading);">
            UNLOCKED SUCCESSFULLY</h2>
        <p style="margin-bottom: 15px; font-size: 1.1rem; color: #EFEFDF; line-height: 1.5;">Unlocked successfully.
            Thank you for using our service!</p>
        
        <div class="countdown-timer-container">
            <span class="countdown-timer-label">Locker will re-lock in</span>
            <div id="countdown-number" class="countdown-timer-number">20</div>
            <span class="countdown-timer-label">seconds</span>
        </div>

        <a href="index.html?v=2" class="btn" style="margin-top: 10px;">DONE</a>
    </div>

    <script src="app.js?v=4"></script>
    
    <!-- Falling Parcels -->
    <div class="parcel-container">
        <div class="parcel-animation" style="left: 5%; animation-duration: 8s; animation-delay: 0s;">📦</div>
        <div class="parcel-animation" style="left: 15%; animation-duration: 12s; animation-delay: 2s;">📦</div>
        <div class="parcel-animation" style="left: 25%; animation-duration: 10s; animation-delay: 4s;">📦</div>
        <div class="parcel-animation" style="left: 35%; animation-duration: 14s; animation-delay: 1s;">📦</div>
        <div class="parcel-animation" style="left: 45%; animation-duration: 9s; animation-delay: 5s;">📦</div>
        <div class="parcel-animation" style="left: 55%; animation-duration: 11s; animation-delay: 3s;">📦</div>
        <div class="parcel-animation" style="left: 65%; animation-duration: 13s; animation-delay: 0.5s;">📦</div>
        <div class="parcel-animation" style="left: 75%; animation-duration: 8.5s; animation-delay: 6s;">📦</div>
        <div class="parcel-animation" style="left: 85%; animation-duration: 15s; animation-delay: 2.5s;">📦</div>
        <div class="parcel-animation" style="left: 95%; animation-duration: 10.5s; animation-delay: 1.5s;">📦</div>
    </div>

</body>

</html>
