<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pick N Go - Request Locker</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=13">
</head>

<body>
    <a href="index.html?v=2" class="logout-link">BACK</a>

    <div class="container auth-box" id="request-box">
        <h2>REQUEST LOCKER</h2>
        <form id="requestForm">
            <div class="form-group">
                <input type="text" id="studentID" placeholder="STUDENT ID :" required>
            </div>
            <div class="form-group">
                <input type="text" id="parcelID" placeholder="PARCEL ID :" required>
            </div>
            <button type="submit" class="btn">REQUEST</button>
        </form>
        <p id="request-message" style="margin-top: 20px; color: red;"></p>
    </div>

    <!-- Success Box (Hidden by default) -->
    <div class="container auth-box" id="success-box" style="display: none;">
        <h2>LOCKER ASSIGNED</h2>
        <p style="margin-bottom: 20px;">Your parcel has been assigned to Locker #<span id="display-locker"></span></p>
        <p><strong>Your 4-Digit PIN is:</strong></p>
        <h1 id="display-pin" style="color: #4CAF50; font-size: 4rem; letter-spacing: 5px; margin: 20px 0;">0000</h1>
        <p style="font-size: 0.8rem; color: #aaa;">This PIN is valid for 72 hours.</p>
        <a href="index.html?v=2" class="btn">DONE</a>
    </div>

    <script src="app.js?v=3"></script>


    
    <!-- Falling Parcels -->
    <div class="parcel-container">
        <div class="parcel-animation" style="left: 5%; animation-duration: 8s; animation-delay: 0s;">📦</div>
        <div class="parcel-animation" style="left: 15%; animation-duration: 12s; animation-delay: 2s;">📦</div>
        <div class="parcel-animation" style="left: 25%; animation-duration: 10s; animation-delay: 4s;">📦</div>
        <div class="parcel-animation" style="left: 35%; animation-duration: 14s; animation-delay: 1s;">📦</div>
        <div class="parcel-animation" style="left: 45%; animation-duration: 9s; animation-delay: 5s;">📦</div>
        <div class="parcel-animation" style="left: 55%; animation-duration: 11s; animation-delay: 3s;">📦</div>
        <div class="parcel-animation" style="left: 65%; animation-duration: 13s; animation-delay: 0.5s;">📦</div>
        <div class="parcel-animation" style="left: 75%; animation-duration: 8.5s; animation-delay: 6s;">📦</div>
        <div class="parcel-animation" style="left: 85%; animation-duration: 15s; animation-delay: 2.5s;">📦</div>
        <div class="parcel-animation" style="left: 95%; animation-duration: 10.5s; animation-delay: 1.5s;">📦</div>
    </div>

</body>

</html>
