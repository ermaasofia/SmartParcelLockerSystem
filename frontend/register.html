<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pick N Go - Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=13">
</head>
<body>
    <div class="container auth-box">
        <h2>REGISTER</h2>
        <form id="registerForm">
            <div class="form-group">
                <input type="text" id="regName" placeholder="USERNAME" required>
            </div>
            <div class="form-group">
                <input type="text" id="regStudentID" placeholder="STUDENT ID" required>
            </div>
            <div class="form-group">
                <input type="email" id="regEmail" placeholder="EMAIL" required>
            </div>
            <div class="form-group">
                <input type="tel" id="regPhone" placeholder="PHONE NUMBER" required>
            </div>
            <div class="form-group">
                <input type="password" id="regPassword" placeholder="PASSWORD" required>
            </div>
            <div class="form-group">
                <input type="password" id="regConfirmPassword" placeholder="CONFIRM PASSWORD" required>
            </div>
            <button type="submit" class="btn">REGISTER</button>
        </form>
        <p id="regMessage" style="margin-top: 20px; color: red;"></p>
        <p style="margin-top: 10px;">
            Already have an account? <a href="login.html">Login here.</a>
        </p>
    </div>
    <script src="app.js?v=3"></script>


    
    <!-- Falling Parcels -->
    <div class="parcel-container">
        <div class="parcel-animation" style="left: 5%; animation-duration: 8s; animation-delay: 0s;">📦</div>
        <div class="parcel-animation" style="left: 15%; animation-duration: 12s; animation-delay: 2s;">📦</div>
        <div class="parcel-animation" style="left: 25%; animation-duration: 10s; animation-delay: 4s;">📦</div>
        <div class="parcel-animation" style="left: 35%; animation-duration: 14s; animation-delay: 1s;">📦</div>
        <div class="parcel-animation" style="left: 45%; animation-duration: 9s; animation-delay: 5s;">📦</div>
        <div class="parcel-animation" style="left: 55%; animation-duration: 11s; animation-delay: 3s;">📦</div>
        <div class="parcel-animation" style="left: 65%; animation-duration: 13s; animation-delay: 0.5s;">📦</div>
        <div class="parcel-animation" style="left: 75%; animation-duration: 8.5s; animation-delay: 6s;">📦</div>
        <div class="parcel-animation" style="left: 85%; animation-duration: 15s; animation-delay: 2.5s;">📦</div>
        <div class="parcel-animation" style="left: 95%; animation-duration: 10.5s; animation-delay: 1.5s;">📦</div>
    </div>

</body>
</html>
